<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Local AI · Search</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
        />
        <link rel="stylesheet" href="/static/css/shared.css" />
        <link rel="stylesheet" href="/static/css/search.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    </head>
    <body>
        <header>
            <a class="header-brand" href="/">
                <div class="brand-dot" id="brand-dot"></div>
                <span class="brand-name">local ai</span>
            </a>
            <nav>
                <a class="nav-link" href="/">chat</a>
                <a class="nav-link active" href="/search">search</a>
            </nav>
            <span class="header-status" id="status-text"></span>
        </header>

        <main>
            <div class="search-wrap">
                <label class="search-label" for="search-input"
                    >search the web, get an AI answer</label
                >
                <div class="search-row">
                    <div class="search-box">
                        <span class="search-icon">⌕</span>
                        <input
                            id="search-input"
                            type="text"
                            placeholder="Ask anything..."
                            autocomplete="off"
                            autofocus
                        />
                    </div>
                    <button id="search-btn" onclick="doSearch()" title="Search">
                        <svg viewBox="0 0 16 16" fill="none">
                            <circle
                                cx="6.5"
                                cy="6.5"
                                r="4"
                                stroke="white"
                                stroke-width="1.5"
                            />
                            <path
                                d="M10 10L13.5 13.5"
                                stroke="white"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="results-grid" id="results-grid" style="display: none">
                <div class="answer-card">
                    <div class="answer-header">
                        <div class="answer-header-dot"></div>
                        <span id="answer-label">AI ANSWER</span>
                    </div>
                    <div class="answer-body empty" id="answer-body">
                        Search to get an answer…
                    </div>
                </div>

                <div class="sources-card">
                    <div class="sources-header">Sources</div>
                    <div id="sources-list">
                        <div class="sources-empty">No sources yet</div>
                    </div>
                </div>
            </div>
        </main>

        <script src="/static/js/shared.js"></script>
        <script src="/static/js/search.js"></script>
    </body>
</html>
