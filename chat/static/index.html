<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Local AI</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
        />
        <link rel="stylesheet" href="/static/css/shared.css" />
        <link rel="stylesheet" href="/static/css/chat.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
        <script type="module" src="/static/js/nav.js"></script>
    </head>
    <body>
        <div id="app">
            <header>
                <div class="header-brand">
                    <div class="brand-dot" id="brand-dot"></div>
                    <span class="brand-name">local ai</span>
                    <span
                        id="model-tag"
                        style="
                            font-size: 9px;
                            color: var(--text3);
                            letter-spacing: 0.04em;
                            margin-left: 4px;
                        "
                    ></span>
                </div>
                <nav data-shared-nav></nav>

                <div class="conv-area">
                    <button id="conv-btn" onclick="toggleDropdown()">
                        <span class="conv-title" id="conv-title"
                            >New conversation</span
                        >
                        <span class="conv-chevron" id="conv-chevron">▾</span>
                    </button>
                    <div id="conv-dropdown">
                        <div class="dropdown-header">
                            <span>conversations</span>
                            <button
                                id="new-conv-btn"
                                onclick="newConversation()"
                            >
                                + new
                            </button>
                        </div>
                        <div id="conv-list"></div>
                    </div>
                </div>

                <div class="header-right">
                    <span class="status-text" id="status-text"></span>
                </div>
            </header>

            <div class="messages-wrap">
                <div id="messages">
                    <div class="empty-state" id="empty-state">
                        <span class="empty-label"
                            >local · private · on-device</span
                        >
                        <div class="suggestions">
                            <span class="suggestion" onclick="fillPrompt(this)"
                                >Explain MLX</span
                            >
                            <span class="suggestion" onclick="fillPrompt(this)"
                                >Write a Python quicksort</span
                            >
                            <span class="suggestion" onclick="fillPrompt(this)"
                                >What is Apple Silicon?</span
                            >
                            <span class="suggestion" onclick="fillPrompt(this)"
                                >FastAPI vs Flask</span
                            >
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <textarea
                        id="input"
                        placeholder="Ask me anything…"
                        rows="1"
                        autofocus
                    ></textarea>
                    <button
                        id="stop-btn"
                        onclick="stopGeneration()"
                        title="Stop"
                    >
                        <svg
                            viewBox="0 0 13 13"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <rect
                                x="2"
                                y="2"
                                width="9"
                                height="9"
                                rx="1.5"
                                fill="var(--border2)"
                            />
                        </svg>
                    </button>
                    <button id="send-btn" onclick="sendMessage()" title="Send">
                        <svg
                            viewBox="0 0 15 15"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M7.5 2L7.5 13M7.5 2L3 6.5M7.5 2L12 6.5"
                                stroke="white"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </button>
                </div>
                <div
                    style="
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                        margin-top: 6px;
                        padding: 0 4px;
                    "
                >
                    <p class="input-hint">
                        <kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline
                    </p>
                    <div style="display: flex; align-items: center; gap: 12px">
                        <div
                            class="agent-toggle on"
                            id="always-allow-toggle"
                            onclick="toggleAlwaysAllow()"
                        >
                            <div class="toggle-track on" id="always-allow-track">
                                <div class="toggle-thumb"></div>
                            </div>
                            <span class="agent-label">always allow</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="/static/js/shared.js"></script>
        <script src="/static/js/chat.js"></script>
    </body>
</html>
