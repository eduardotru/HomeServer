<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>_template</title>
        <link rel="stylesheet" href="/ui/tokens.css" />
        <link rel="stylesheet" href="/ui/kit.css" />
        <link rel="stylesheet" href="./app.css" />
        <script type="module" src="/ui/kit.js"></script>
    </head>
    <body>
        <main>
            <hs-card>
                <h1 slot="title">Items</h1>

                <hs-form id="add-form">
                    <hs-field label="Name">
                        <hs-input name="name" placeholder="e.g. milk" required></hs-input>
                    </hs-field>
                    <hs-button type="submit" variant="primary">Add</hs-button>
                </hs-form>

                <hs-list id="items"></hs-list>
            </hs-card>
        </main>

        <script type="module" src="./app.js"></script>
    </body>
</html>
