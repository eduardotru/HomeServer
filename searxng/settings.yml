use_default_settings: true

general:
  instance_name: "HomeServer Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "homeserver-local-only"
  bind_address: "0.0.0.0"
  port: 8080
  base_url: false
  image_proxy: false
  limiter: false # local-only instance, no need for bot detection

ui:
  static_use_hash: true
  default_theme: simple
  center_alignment: true

# Multiple engines for resilience — if one gets rate-limited, others pick up.
# SearXNG deduplicates and merges results automatically.
engines:
  - name: duckduckgo
    engine: duckduckgo
    disabled: false

  - name: brave
    engine: brave
    disabled: false

  - name: qwant
    engine: qwant
    disabled: false

  - name: mojeek
    engine: mojeek
    disabled: false

  - name: wikipedia
    engine: wikipedia
    disabled: false

  - name: startpage
    engine: startpage
    disabled: false

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
